<!DOCTYPE html>
<html>

<head>
  <title>Discussions</title>
</head>

<body>
  <h1>Discussions</h1>

  {% if session.username %}
  <p>
    You're logged in as {{ session.username }} 
  </p>
    You are the #{{ session.user_id }} user created!
  </p>
  {% endif %}

  <p>
    <a href="/login"><button>Log in</button></a>
  </p>
    <a href="/register">Create an account</a>
  </p>
    <a href="/logout"><button>Log out</button></a>
  </p>
    Start a <a href="/new_item"><button style="background-color: rgb(252, 174, 197);">new topic</button></a>
  </p>

  <h2>Current topics</h2>

  <ul>
  {% for item in items %}
  <li><a href="/item/{{ item.id }}">{{ item.title }}</a></li>
  {% endfor %}
  </ul>
</body>

</html>
