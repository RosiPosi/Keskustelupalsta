<!DOCTYPE html>
<html>

<head>
  <title>Deleting</title>
</head>

<body style="background-color: rgb(249, 252, 255);">
  <h1>Deleting your topic</h1>
  <p>Topic: {{ item.title }}</p>
  <p>Are you <b>sure</b> you want to <b>delete</b> this topic?</p>
  <form action="/remove_item/{{ item.id }}" method="post">
    <input type="submit" name="remove" value="Delete">
    <input type="submit" name="back" value="Back">
  </form>
</body>

</html>
