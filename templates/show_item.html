<!DOCTYPE html>
<html>

<head>
  <title>{{ item.title }}</title>
</head>

<body>
  <h1>{{ item.title }}</h1>

  {% if session.user_id == item.user_id %}
  <p>
    <a href="/edit/{{ item.id }}">Edit</a> 
  </p>
  {% endif %}

  <p>
    {{ item.description }}
  </p>
  <p>
    Started by: {{ item.username }}
  </p>
  <p>
    <a href="/">Back</a>
  </p>
</body>

</html>
