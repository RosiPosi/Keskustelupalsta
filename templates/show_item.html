<!DOCTYPE html>
<html>

<head>
  <title>{{ item.title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <h1>{{ item.title }}</h1>

  <div class="border" style="white-space: pre-wrap;">{{ item.description }}</div>

  <p>
    
    {% for class in classes %}
    {{ class.title }}: {{ class.value }}
    {% endfor %}
    
  </p>

  <p>
    Started by: <a href="/user/{{ item.user_id }}">{{ item.username }}</a>
  </p>

  {% if session.user_id == item.user_id %}
  <p>
    <a href="/edit_item/{{ item.id }}">Edit</a>
    <a href="/remove_item/{{ item.id }}">Delete</a>  
  </p>
  {% endif %}
<!-- returns the user to the last page -->
  <p>
    <button onclick="history.back()">Back</button>
  </p>
  
</body>

</html>
