<!DOCTYPE html>
<html>

<head>
  <title>{{ item.title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <h1>{{ item.title }}</h1>

  <div class="border" style="white-space: pre-wrap;">{{ item.description }}</div>


  <p>
    Started by: <a href="/user/{{ item.user_id }}">{{ item.username }}</a>
  </p>

  {% if session.user_id == item.user_id %}
  <p>
    <a href="/edit_item/{{ item.id }}">Edit</a>
    <a href="/remove_item/{{ item.id }}">Delete</a>  
  </p>
  {% endif %}
<!-- returns the user to the last page -->
  <a href="/">
    <button>Back</button>
  </a>
  <ul>
    {% for comment in comments %}
    <p>
    <a href="/user/{{ comment.user_id }}">{{ comment.username }}</a>: {{ comment.comment }}
    </p>
    {% endfor %}
  </ul>
    <form action="/comment" method="post">
    <input type="hidden" name="item_id" value="{{ item.id }}">
    <p>
        Discuss: <br />
        <textarea name="comment" rows="6" cols="60" maxlength="450" required></textarea>
    </p>
      <input type="submit" value="Post" />
    </form>

</body>

</html>
