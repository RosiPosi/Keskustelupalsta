<!DOCTYPE html>
<html>

<head>
  <title>Topics on {{ query }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

  <div class="search-container">

    <!--SEARCH BAR-->
    <form action="/search" method="GET">
      <p>Search: <input type="text" name="query" value="{{ query }}"> 
      <input type="submit" value="Search"> </p>
    </form>
    

    <!--DISCUSSIONS COLUMN-->

  

    {% if results %}
        <h2>Opinions about {{ query }}:</h2>
        <ul>
        {% for item in results %}
            <li><a href="/opinion/{{ item.id }}">{{ item.title }}</a></li>
        {% endfor %}
        </ul>

  
    {% else %}
        <h2>No opinions about {{ query }} :(</h2>
        {% if session.user_id %}
          <a href="/new_opinion">
              <button class="button">Create one!</button>
          </a>
        {% else %}
        <p><a href="/login">Log in</a> to create one!</p>
        {% endif %}

    {% endif %}

    <p>
    <a href="/">Back home</a>
    </p>
  </div>
    

</body>
</html>
