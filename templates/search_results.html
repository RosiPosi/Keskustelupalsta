<!DOCTYPE html>
<html>

<head>
  <title>Topics on {{ query }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

  <div class="main">
    <!--SEARCH BAR-->
    <form action="/search" method="GET">
      <p>Search: <input type="text" name="query" placeholder="{{ query }}"> 
      <input type="submit" value="Search"> </p>
    </form>
    

    <!--DISCUSSIONS COLUMN-->
    {% if query %}
    <h2>Disscussions about {{ query }}:</h2>
    {% endif %}

    <ul>
      {% for item in results %}
        <li><a href="/item/{{ item[0] }}">{{ item[1] }}</a></li>
      {% endfor %}
    </ul>
  </div>
    

</body>
</html>
