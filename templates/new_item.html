<!DOCTYPE html>
<html>

<head>
  <title>New topic</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <h1>New topic</h1>
  <form action="/create_item" method="post">
    <p>
      Title: <br />
      <input type="text" size="60" name="title" maxlength="50" required/>
    </p>
    
    <p>
      Description: <br />
      <textarea name="description" rows="7" cols="60" maxlength="1000" placeholder="Add some context! This is optional."></textarea>
    </p>
    
    {% for class in classes %}
    <p>{{ class }} <br />
      <select name="classes">
        <option value="">(choose)</option>
      {% for option in classes[class] %}
        <option value="{{ class }}:{{ option }}">{{ option }}</option>
      {% endfor %}
      </select>

    </p>
    {% endfor %}
    <p>Note: images can be added after posting!</p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Post" />
  </form>
</body>

</html>
