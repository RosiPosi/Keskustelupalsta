<!DOCTYPE html>
<html>

<head>
  <title>Editing</title>
</head>

<body>
  <h1>Edit your topic</h1>
  <form action="/update_item" method="post">
    <p>
      Title: <br />
      <input type="text" size="60" name="title" value="{{ item.title }}" />
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="7" cols="60">{{ item.description }}</textarea>>
    </p>
    <input type="submit" value="Update topic" />
    <input type="hidden" name="item_id" value="{{ item.id }}" />
  </form>
</body>

</html>
