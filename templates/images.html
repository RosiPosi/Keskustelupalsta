<!DOCTYPE html>
<html>

<head>
  <title>Images</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <h1>Images</h1>

  <p>
    {{ images | count }} images attached.
  </p>

    <form action="/remove_images" method="post">
        {% for image in images %}
        <input type="checkbox" name="image_id" value="{{ image.id }}">
        <img src="/image/{{ image.id }}"/>
        {% endfor %}
        <input type="hidden" name="item_id" value="{{ item.id }}">
        <p>
            <input type="submit" value="Remove selected" />
        </p>
    </form>

    <h2>Add images:</h2>
    <form action="/add_image" method="post" enctype="multipart/form-data">
        <p>
        Image: <input type="file" name="image" accept=".png" />
        </p>
        <input type="hidden" name="item_id" value="{{ item.id }}">
        <input type="submit" value="Add" />
    </form>
  <p>
    <a href="/item/{{ item.id }}"><button>Back</button></a>
  </p>

</body>

</html>
