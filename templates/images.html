<!DOCTYPE html>
<html>

<head>
  <title>Images</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <h1>Images</h1>

  <p>
    {{ images | count }} images attached.
  </p>

    <h2>Add images:</h2>
    <form action="/add_image" method="post" enctype="multipart/form-data">
        <p>
        Kuva: <input type="file" name="image" accept=".png, .jpg" />
        </p>
        <input type="hidden" name="item_id" value="{{ item.id }}">
        <input type="submit" value="Lähetä" />
    </form>
  <p>
    <a href="/item/{{ item.id }}"><button>Back</button></a>
  </p>

</body>

</html>
